<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi-Lite Coaching — Programs Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --neon: #CAFF4C;
      --neon-dim: rgba(202,255,76,0.12);
      --neon-glow: rgba(202,255,76,0.25);
      --bg: #0a0a0a;
      --bg-card: #111111;
      --bg-surface: #1a1a1a;
      --bg-hover: #1f1f1f;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(202,255,76,0.3);
      --text-primary: #f0f0f0;
      --text-secondary: #999;
      --text-muted: #555;
      --inactive: #333;
      --inactive-text: #666;
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.12);
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --coral: #f87171;
      --coral-dim: rgba(248,113,113,0.12);
      --teal: #34d399;
      --teal-dim: rgba(52,211,153,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --font: 'Space Grotesk', system-ui, sans-serif;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; }
    .shell { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    /* ── Header ── */
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 8px var(--neon); }
    .brand-name { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .page-title { font-size: 24px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── Search ── */
    .search-box {
      font-size: 13px; font-family: var(--font);
      padding: 8px 14px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-primary); outline: none; width: 210px;
      transition: border-color 0.2s;
    }
    .search-box::placeholder { color: var(--text-muted); }
    .search-box:focus { border-color: var(--neon); }

    /* ── Filter buttons ── */
    .filter-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      font-size: 12px; font-family: var(--font);
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--neon); }
    .filter-btn.active { background: var(--neon); color: #0a0a0a; border-color: var(--neon); font-weight: 600; }

    /* ── Refresh ── */
    .refresh-btn {
      font-size: 12px; font-family: var(--font);
      padding: 7px 14px; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--border-hover); color: var(--neon); }
    .refresh-icon { display: inline-block; transition: transform 0.5s ease; }
    .refresh-btn.spinning .refresh-icon { transform: rotate(360deg); }

    /* ── Metrics ── */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; }
    .metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text-primary); }
    .metric-value.neon { color: var(--neon); }
    .metric-value.dim  { color: var(--text-muted); }

    /* ── Type tabs ── */
    .type-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .type-tab {
      font-size: 12px; font-family: var(--font);
      padding: 5px 13px; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .type-tab:hover { border-color: rgba(255,255,255,0.2); color: var(--text-primary); }
    .type-tab.active { background: var(--bg-surface); border-color: rgba(255,255,255,0.25); color: var(--text-primary); font-weight: 500; }

    /* ── Status bar ── */
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--neon); flex-shrink: 0; }
    .status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
    .status-dot.error   { background: var(--coral); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Table / Row layout ── */
    .table-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .table-head {
      display: grid;
      grid-template-columns: 1fr 140px 110px 100px;
      padding: 10px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 500;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 140px 110px 100px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.12s;
      gap: 12px;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--bg-hover); }
    .row.dim { opacity: 0.45; }

    /* Row cells */
    .cell-name { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .program-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row:hover .program-name { color: var(--neon); }
    .offmenu-tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 999px; background: var(--coral-dim); color: var(--coral); border: 1px solid rgba(248,113,113,0.2); width: fit-content; }

    .cell-type {}
    .type-pill { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; display: inline-block; }
    .tp-private  { background: var(--blue-dim);   color: var(--blue);   border: 1px solid rgba(96,165,250,0.2); }
    .tp-group    { background: var(--purple-dim);  color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
    .tp-parent   { background: var(--teal-dim);    color: var(--teal);   border: 1px solid rgba(52,211,153,0.2); }
    .tp-workshop { background: var(--amber-dim);   color: var(--amber);  border: 1px solid rgba(251,191,36,0.2); }
    .tp-other    { background: var(--bg-surface);  color: var(--text-muted); border: 1px solid var(--border); }

    .cell-status {}
    .status-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; display: inline-block; }
    .s-active   { background: var(--neon-dim); color: var(--neon); border: 1px solid rgba(202,255,76,0.25); }
    .s-inactive { background: var(--bg-surface); color: var(--inactive-text); border: 1px solid var(--border); }

    .cell-link {}
    .link-btn {
      font-size: 11px; font-weight: 500;
      padding: 5px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: transparent;
      color: var(--neon); cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all 0.15s; white-space: nowrap;
    }
    .link-btn:hover { background: var(--neon-dim); border-color: var(--neon); }
    .no-link { font-size: 11px; color: var(--text-muted); font-style: italic; }

    /* ── Empty ── */
    .empty-row { padding: 4rem 2rem; text-align: center; color: var(--text-muted); font-size: 14px; }

    /* ── Footer ── */
    .page-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; flex-wrap: wrap; gap: 8px; }
    .results-count { font-size: 12px; color: var(--text-muted); }
    .sync-time { font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="brand"><div class="brand-dot"></div><span class="brand-name">Hi-Lite Coaching &amp; Consulting</span></div>
      <div class="page-title">Programs Directory</div>
    </div>
    <div class="header-right">
      <input class="search-box" type="text" id="searchInput" placeholder="Search programs…" oninput="renderAll()" />
      <div class="filter-wrap">
        <button class="filter-btn active" onclick="setStatusFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setStatusFilter('active',this)">Active</button>
        <button class="filter-btn" onclick="setStatusFilter('inactive',this)">Inactive</button>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchFromSheet(true)">
        <span class="refresh-icon">↻</span> Refresh
      </button>
    </div>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metrics"></div>

  <!-- Type tabs -->
  <div class="type-tabs" id="typeTabs"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading…</span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-head">
      <div>Program</div>
      <div>Type</div>
      <div>Status</div>
      <div>Link</div>
    </div>
    <div id="rowGrid"></div>
  </div>

  <!-- Footer -->
  <div class="page-footer">
    <span class="results-count" id="resultsCount"></span>
    <span class="sync-time" id="pageFooter"></span>
  </div>

</div>
<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1-uM1RJsiUY_Timor7wMm0H8RFPd8PzYo7Cakdz80MQ2TKpWoYCWWWMqisOjmv_QNtcdofGZ8Xe0-/pub?gid=0&single=true&output=csv";

const FALLBACK = [
  { name:"Hi-Lite New Coach Onboarding",        status:"Active",   link:"https://funnels.hilitecoaching.com/join",                       type:"Other",           offmenu:false },
  { name:"Youth Client",                         status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-to-youth-client",    type:"Private Coaching",offmenu:false },
  { name:"Youth Membership",                     status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-to-youth-membership",type:"Private Coaching",offmenu:false },
  { name:"Youth Client (3mos Payment Plan)",     status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-to-youth-client-plan",type:"Private Coaching",offmenu:false },
  { name:"Youth Client (6 session)",             status:"Active",   link:"https://link.fastpaydirect.com/payment-link/6977bf080ded1e3e0a034b74",type:"Private Coaching",offmenu:true },
  { name:"Adult Client",                         status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-to-teen-client",     type:"Private Coaching",offmenu:false },
  { name:"Adult Membership",                     status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-to-adult-membership",type:"Private Coaching",offmenu:false },
  { name:"Adult Client (6 session)",             status:"Active",   link:"https://funnels.hilitecoaching.com/adult-6session",             type:"Private Coaching",offmenu:true },
  { name:"Adult Coaching 19 weeks",              status:"Active",   link:"https://funnels.hilitecoaching.com/adult-coaching-19",          type:"Private Coaching",offmenu:true },
  { name:"Brain Flex Coaching",                  status:"Active",   link:"https://funnels.hilitecoaching.com/private-brain-flex",         type:"Private Coaching",offmenu:false },
  { name:"Get Launched Career Prep",             status:"Active",   link:"https://funnels.hilitecoaching.com/get-launched",              type:"Private Coaching",offmenu:false },
  { name:"EmpowHer Private",                     status:"Active",   link:"https://funnels.hilitecoaching.com/empowher-private",          type:"Private Coaching",offmenu:false },
  { name:"Relentless 90",                        status:"Active",   link:"https://funnels.hilitecoaching.com/relentless-90",             type:"Private Coaching",offmenu:false },
  { name:"The Work Private",                     status:"Active",   link:"https://funnels.hilitecoaching.com/the-work-onboarding",       type:"Private Coaching",offmenu:false },
  { name:"Career Scoops",                        status:"Active",   link:"https://funnels.hilitecoaching.com/career-scoops",             type:"Private Coaching",offmenu:false },
  { name:"Family Coaching",                      status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-to-family-coaching",type:"Parent Coaching",  offmenu:false },
  { name:"Empowered Families",                   status:"Active",   link:"https://funnels.hilitecoaching.com/parent-group-coaching",     type:"Parent Coaching",  offmenu:false },
  { name:"Roper YMCA",                           status:"Active",   link:"https://funnels.hilitecoaching.com/welcome-ymca-roper",        type:"Group Coaching",   offmenu:false },
  { name:"EmpowHer Group",                       status:"Active",   link:"https://funnels.hilitecoaching.com/empowher",                  type:"Group Coaching",   offmenu:false },
  { name:"Relentless GROUP 90",                  status:"Active",   link:"https://funnels.hilitecoaching.com/relentless-90-group",       type:"Group Coaching",   offmenu:false },
  { name:"Continuation Group",                   status:"Active",   link:"https://funnels.hilitecoaching.com/continuation-group",        type:"Group Coaching",   offmenu:false },
  { name:"Young Founders Institute",             status:"Active",   link:"https://funnels.hilitecoaching.com/young-entrepreneurs",       type:"Group Coaching",   offmenu:false },
  { name:"Brain Flex Group",                     status:"Active",   link:"https://funnels.hilitecoaching.com/brain-flex-by-hi-lite",     type:"Group Coaching",   offmenu:false },
  { name:"The Work Group",                       status:"Inactive", link:"https://funnels.hilitecoaching.com/the-work-onboarding",       type:"Group Coaching",   offmenu:false },
  { name:"What's Next: Life After Highschool",   status:"Active",   link:"https://funnels.hilitecoaching.com/college-prep",              type:"Workshops",        offmenu:false },
  { name:"How Money Works",                      status:"Active",   link:"https://funnels.hilitecoaching.com/fin-lit",                   type:"Workshops",        offmenu:false },
  { name:"HiLight Hangouts (Orlando)",           status:"Active",   link:"https://funnels.hilitecoaching.com/orlando-teen-social-group1",type:"Workshops",        offmenu:false },
  { name:"Service Brochure (WIP)",               status:"Active",   link:"https://funnels.hilitecoaching.com/program",                   type:"Workshops",        offmenu:false },
  { name:"Workshop Feedback",                    status:"Active",   link:"",                                                              type:"Workshops",        offmenu:false },
];

let programs = [];
let statusFilter = 'all';
let typeFilter   = 'all';

/* ── CSV ── */
function splitLine(line) {
  const res=[]; let cur=''; let q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){q=!q;}
    else if(c===','&&!q){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur); return res;
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const hdrs=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const vals=splitLine(line);
    const obj={};
    hdrs.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
    return obj;
  }).filter(r=>Object.values(r)[0]);
}
function mapRow(row){
  const get=(...keys)=>{
    for(const k of keys){
      const f=Object.keys(row).find(rk=>rk.includes(k.toLowerCase()));
      if(f&&row[f])return row[f];
    }return'';
  };
  const name=get('program name','name');
  return{ name, status:get('status')||'Active', link:get('signup link','link','url','landing'), type:get('type'), offmenu:name.toLowerCase().includes('off menu') };
}

/* ── Fetch ── */
async function fetchFromSheet(manual=false){
  if(manual)animateRefresh();
  setStatus('loading','Syncing with Google Sheets…');
  try{
    const res=await fetch(SHEET_CSV+'&t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const rows=parseCSV(text);
    const mapped=rows.map(mapRow).filter(p=>p.name);
    if(!mapped.length)throw new Error('Empty');
    programs=mapped;
    setStatus('ok','Live · synced from Google Sheets');
    document.getElementById('pageFooter').textContent='Last synced: '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
  }catch(e){
    if(!programs.length)programs=FALLBACK;
    setStatus('ok','Built-in data · sheet sync unavailable');
    document.getElementById('pageFooter').textContent='Built-in data · '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  renderAll();
}

/* ── Render ── */
function renderAll(){ renderMetrics(); renderTypeTabs(); renderRows(); }

function renderMetrics(){
  const total=programs.length;
  const active=programs.filter(p=>p.status.toLowerCase()==='active').length;
  const inactive=programs.filter(p=>p.status.toLowerCase()==='inactive').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Active</div><div class="metric-value neon">${active}</div></div>
    <div class="metric"><div class="metric-label">Inactive</div><div class="metric-value dim">${inactive}</div></div>`;
}

function renderTypeTabs(){
  const types=['all',...new Set(programs.map(p=>p.type).filter(Boolean).sort())];
  document.getElementById('typeTabs').innerHTML=types.map(t=>
    `<button class="type-tab${typeFilter===t?' active':''}" onclick="setTypeFilter('${t}')">${t==='all'?'All types':t}</button>`
  ).join('');
}

function renderRows(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const filtered=programs.filter(p=>{
    const st=p.status.toLowerCase();
    const mS=statusFilter==='all'||st===statusFilter;
    const mT=typeFilter==='all'||p.type===typeFilter;
    const mQ=p.name.toLowerCase().includes(search)||(p.type||'').toLowerCase().includes(search);
    return mS&&mT&&mQ;
  });

  document.getElementById('resultsCount').textContent=filtered.length+' of '+programs.length+' programs';

  const grid=document.getElementById('rowGrid');
  if(!filtered.length){grid.innerHTML='<div class="empty-row">No programs match your search or filter.</div>';return;}

  const typeRaw=t=>(t||'').toLowerCase();
  const pillClass=t=>typeRaw(t).includes('private')?'tp-private':typeRaw(t).includes('group')?'tp-group':typeRaw(t).includes('parent')?'tp-parent':typeRaw(t).includes('workshop')?'tp-workshop':'tp-other';

  grid.innerHTML=filtered.map(p=>{
    const st=p.status.toLowerCase();
    const dim=st==='inactive'?' dim':'';
    const offM=p.offmenu?`<span class="offmenu-tag">Off-menu</span>`:'';
    const link=p.link&&p.link.startsWith('http')
      ?`<a class="link-btn" href="${p.link}" target="_blank" rel="noopener">Open ↗</a>`
      :`<span class="no-link">No link</span>`;
    return `<div class="row${dim}">
      <div class="cell-name">
        <div class="program-name">${p.name}</div>
        ${offM}
      </div>
      <div class="cell-type"><span class="type-pill ${pillClass(p.type)}">${p.type||'—'}</span></div>
      <div class="cell-status"><span class="status-badge ${st==='active'?'s-active':'s-inactive'}">${p.status}</span></div>
      <div class="cell-link">${link}</div>
    </div>`;
  }).join('');
}

/* ── Filters ── */
function setStatusFilter(f,btn){
  statusFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderAll();
}
function setTypeFilter(f){ typeFilter=f; renderAll(); }

/* ── Helpers ── */
function setStatus(state,msg){
  const dot=document.getElementById('statusDot');
  dot.className='status-dot'+(state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('statusText').textContent=msg;
}
function animateRefresh(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'),600);
}

/* ── Init ── */
programs=FALLBACK;
renderAll();
setStatus('ok','Showing built-in data · attempting sheet sync…');
document.getElementById('pageFooter').textContent='Built-in data · '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
fetchFromSheet();
</script>
</body>
</html>
