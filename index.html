<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi-Lite Coaching — Programs Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE; --green-mid: #9FE1CB;
      --amber-light: #FAEEDA; --amber-text: #854F0B;
      --gray-light: #F1EFE8; --gray-text: #5F5E5A;
      --red-light: #FCEBEB; --red-text: #A32D2D;
      --blue-light: #E6F1FB; --blue-text: #185FA5;
      --purple-light: #EEEDFE; --purple-text: #3C3489;
      --border: #e8e5de; --border-hover: #c5c2bb;
      --bg-page: #f7f6f3; --bg-card: #fff; --bg-surface: #f0ede8;
      --text-primary: #1a1a18; --text-secondary: #555; --text-muted: #aaa;
      --radius-sm: 8px; --radius-md: 10px; --radius-lg: 14px;
      --font: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg-page); color: var(--text-primary); min-height: 100vh; }
    .shell { max-width: 1120px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Header ── */
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .brand-name { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .page-title { font-size: 22px; font-weight: 500; color: var(--text-primary); }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── Controls ── */
    .search-box { font-size: 13px; font-family: var(--font); padding: 7px 13px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); outline: none; width: 200px; transition: border-color 0.15s; }
    .search-box:focus { border-color: var(--green); }
    .filter-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; font-family: var(--font); padding: 6px 13px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { background: var(--bg-surface); color: var(--text-primary); }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .refresh-btn { font-size: 12px; font-family: var(--font); padding: 6px 13px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
    .refresh-btn:hover { background: var(--bg-surface); color: var(--text-primary); }
    .refresh-btn svg { transition: transform 0.4s; }
    .refresh-btn.spinning svg { transform: rotate(360deg); }

    /* ── Metrics ── */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; }
    .metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .metric-value { font-size: 24px; font-weight: 500; color: var(--text-primary); }
    .metric-value.green { color: var(--green); }
    .metric-value.amber { color: var(--amber-text); }
    .metric-value.gray { color: var(--gray-text); }

    /* ── Status bar ── */
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 1.25rem; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .status-dot.loading { background: var(--amber-text); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red-text); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

    /* ── Card ── */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.15rem 1.2rem; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.15s, box-shadow 0.15s; }
    .card:hover { border-color: var(--border-hover); box-shadow: 0 2px 14px rgba(0,0,0,0.06); }
    .card.dim { opacity: 0.58; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-type { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .program-name { font-size: 15px; font-weight: 500; color: var(--text-primary); line-height: 1.3; }
    .status-badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .s-active   { background: var(--green-light);  color: var(--green-dark); }
    .s-inactive { background: var(--gray-light);   color: var(--gray-text); }
    .s-other    { background: var(--amber-light);  color: var(--amber-text); }
    .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.55; font-style: italic; border-left: 2px solid var(--bg-surface); padding-left: 9px; }
    .card-meta { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid var(--bg-surface); padding-top: 10px; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .meta-key { color: var(--text-muted); }
    .meta-val { color: var(--text-secondary); font-weight: 500; }
    .type-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; }
    .type-group   { background: var(--purple-light); color: var(--purple-text); }
    .type-private { background: var(--blue-light);   color: var(--blue-text); }
    .type-hybrid  { background: var(--green-light);  color: var(--green-dark); }
    .type-other   { background: var(--gray-light);   color: var(--gray-text); }
    .card-footer { display: flex; gap: 7px; flex-wrap: wrap; }
    .link-btn { font-size: 11px; padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--blue-text); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: background 0.12s; }
    .link-btn:hover { background: var(--blue-light); }
    .no-link { font-size: 11px; color: var(--text-muted); font-style: italic; }

    /* ── Empty / error states ── */
    .state-box { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; }
    .state-box .icon { font-size: 32px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .state-box .hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

    /* ── Skeleton loader ── */
    .skeleton-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.15rem 1.2rem; display: flex; flex-direction: column; gap: 10px; }
    .skel { background: linear-gradient(90deg, var(--bg-surface) 25%, var(--border) 50%, var(--bg-surface) 75%); background-size: 200% 100%; border-radius: 4px; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-title { height: 16px; width: 70%; }
    .skel-badge { height: 20px; width: 20%; border-radius: 999px; }
    .skel-line  { height: 12px; }
    .skel-short { height: 12px; width: 55%; }

    /* ── Footer ── */
    .page-footer { font-size: 11px; color: var(--text-muted); margin-top: 2rem; text-align: right; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="brand"><div class="brand-dot"></div><span class="brand-name">Hi-Lite Coaching &amp; Consulting</span></div>
      <div class="page-title">Programs Directory</div>
    </div>
    <div class="header-right">
      <input class="search-box" type="text" id="searchInput" placeholder="Search programs…" oninput="renderAll()" />
      <div class="filter-wrap">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
        <button class="filter-btn" onclick="setFilter('inactive',this)">Inactive</button>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchData(true)" title="Reload from sheet">
        <svg id="refreshIcon" width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.5 6.5A5 5 0 1 1 8 2.07" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M8 1v3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Active</div><div class="metric-value green">—</div></div>
    <div class="metric"><div class="metric-label">Inactive</div><div class="metric-value gray">—</div></div>
    <div class="metric"><div class="metric-label">No price yet</div><div class="metric-value amber">—</div></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading programs from sheet…</span>
  </div>

  <!-- Card grid -->
  <div class="grid" id="cardGrid"></div>

  <div class="page-footer" id="pageFooter"></div>
</div>

<script>
  const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1-uM1RJsiUY_Timor7wMm0H8RFPd8PzYo7Cakdz80MQ2TKpWoYCWWWMqisOjmv_QNtcdofGZ8Xe0-/pub?gid=0&single=true&output=csv";

  let programs = [];
  let currentFilter = 'all';

  /* ── CSV parser (handles quoted fields with commas) ── */
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const vals = splitCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
      return obj;
    }).filter(r => r[headers[0]]); // skip blank rows
  }

  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  }

  /* ── Map CSV row → program object ── */
  function mapRow(row) {
    // flexible key matching
    const get = (...keys) => {
      for (const k of keys) {
        const found = Object.keys(row).find(rk => rk.includes(k.toLowerCase()));
        if (found && row[found]) return row[found];
      }
      return '';
    };
    return {
      name:   get('program name', 'name'),
      desc:   get('description', 'desc'),
      status: get('status'),
      link:   get('signup link', 'link', 'url', 'landing'),
      type:   get('type'),
      price:  get('price'),
    };
  }

  /* ── Fetch from sheet ── */
  async function fetchData(manual = false) {
    setStatus('loading', 'Loading programs from sheet…');
    showSkeletons();
    if (manual) animateRefreshBtn();

    try {
      const res = await fetch(SHEET_CSV + '&t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);
      programs = rows.map(mapRow).filter(p => p.name);

      if (!programs.length) {
        setStatus('error', 'Sheet loaded but no program data found — check column headers.');
        showEmpty('No programs found', 'Make sure the sheet has data starting from row 2.');
        return;
      }

      setStatus('ok', 'Live from Google Sheets · ' + programs.length + ' program' + (programs.length !== 1 ? 's' : ''));
      renderAll();
      document.getElementById('pageFooter').textContent = 'Last synced: ' + new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

    } catch (err) {
      setStatus('error', 'Could not reach the sheet. Check your connection or re-publish the sheet.');
      showEmpty('Could not load data', 'Make sure the sheet is published to web as CSV and the URL is correct.<br><span class="hint">Error: ' + err.message + '</span>');
    }
  }

  /* ── Render ── */
  function renderAll() { renderMetrics(); renderCards(); }

  function renderMetrics() {
    const total    = programs.length;
    const active   = programs.filter(p => p.status.toLowerCase() === 'active').length;
    const inactive = programs.filter(p => p.status.toLowerCase() === 'inactive').length;
    const noPrice  = programs.filter(p => !p.price || p.price.toLowerCase().includes('fill') || p.price === '—').length;
    document.getElementById('metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${total}</div></div>
      <div class="metric"><div class="metric-label">Active</div><div class="metric-value green">${active}</div></div>
      <div class="metric"><div class="metric-label">Inactive</div><div class="metric-value gray">${inactive}</div></div>
      <div class="metric"><div class="metric-label">No price yet</div><div class="metric-value amber">${noPrice}</div></div>`;
  }

  function renderCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = programs.filter(p => {
      const st = p.status.toLowerCase();
      const matchFilter = currentFilter === 'all' || st === currentFilter;
      const matchSearch = p.name.toLowerCase().includes(search) ||
                          (p.desc || '').toLowerCase().includes(search) ||
                          (p.type || '').toLowerCase().includes(search) ||
                          (p.price || '').toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    const grid = document.getElementById('cardGrid');
    if (!filtered.length) {
      grid.innerHTML = '<div class="state-box"><div class="icon">🔍</div><p>No programs match your search or filter.</p></div>';
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const st = p.status.toLowerCase();
      const badgeClass = st === 'active' ? 's-active' : st === 'inactive' ? 's-inactive' : 's-other';
      const badgeLabel = p.status || 'Unknown';
      const isDim = st === 'inactive';

      const typeRaw = (p.type || '').toLowerCase();
      const typeClass = typeRaw.includes('group') ? 'type-group' : typeRaw.includes('private') ? 'type-private' : typeRaw.includes('hybrid') ? 'type-hybrid' : 'type-other';
      const typeLabel = p.type || 'N/A';

      const descHtml = p.desc && !p.desc.toLowerCase().includes('to fill')
        ? `<div class="card-desc">${p.desc}</div>` : '';

      const priceDisplay = (!p.price || p.price.toLowerCase().includes('to fill') || p.price === '')
        ? '<span style="color:var(--text-muted);font-style:italic;">TBD</span>'
        : `<span class="meta-val">${p.price}</span>`;

      const linkHtml = p.link && p.link.startsWith('http')
        ? `<a class="link-btn" href="${p.link}" target="_blank" rel="noopener">
            Sign up
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8L8 2M8 2H4M8 2V6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
           </a>`
        : `<span class="no-link">No link yet</span>`;

      return `
        <div class="card${isDim ? ' dim' : ''}">
          <div class="card-header">
            <div>
              <div class="card-type"><span class="type-pill ${typeClass}">${typeLabel}</span></div>
              <div class="program-name">${p.name}</div>
            </div>
            <span class="status-badge ${badgeClass}">${badgeLabel}</span>
          </div>
          ${descHtml}
          <div class="card-meta">
            <div class="meta-row"><span class="meta-key">Price</span>${priceDisplay}</div>
          </div>
          <div class="card-footer">${linkHtml}</div>
        </div>`;
    }).join('');
  }

  /* ── Helpers ── */
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  }

  function setStatus(state, msg) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
    txt.textContent = msg;
  }

  function showSkeletons() {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = Array(6).fill(0).map(() => `
      <div class="skeleton-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div class="skel skel-title"></div>
          <div class="skel skel-badge"></div>
        </div>
        <div class="skel skel-line"></div>
        <div class="skel skel-short"></div>
        <div class="skel" style="height:12px;width:40%;"></div>
      </div>`).join('');
  }

  function showEmpty(title, hint) {
    document.getElementById('cardGrid').innerHTML = `<div class="state-box"><div class="icon">📋</div><p>${title}</p><p class="hint">${hint}</p></div>`;
  }

  function animateRefreshBtn() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 600);
  }

  /* ── Init ── */
  fetchData();
</script>
</body>
</html>
